name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  api-and-spatial:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: buili
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d buili"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            buili_spatial/requirements*.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]" -r buili_spatial/requirements-dev.txt
      - run: python -m ruff check buili_spatial apps/api/src apps/api/tests
      - run: python -m mypy --config-file apps/api/pyproject.toml apps/api/src/buili_api
      - run: python -m pip check
      - run: python -m pytest -c apps/api/pyproject.toml buili_spatial/tests apps/api/tests -q
      - name: Bootstrap disposable PostgreSQL roles
        working-directory: apps/api
        run: python scripts/prepare_ci_postgres.py bootstrap
      - name: Exercise migrations as isolated migrator
        working-directory: apps/api
        env:
          BUILI_DATABASE_URL: postgresql+asyncpg://buili_migrator:ci-migrator-password@127.0.0.1:5432/buili
          BUILI_AUTO_CREATE_SCHEMA: "false"
        run: alembic upgrade head
      - name: Grant runtime roles
        working-directory: apps/api
        run: python scripts/prepare_ci_postgres.py grants
      - name: Prove PostgreSQL tenant RLS and worker isolation
        working-directory: apps/api
        env:
          BUILI_TEST_POSTGRES_API_URL: postgresql+asyncpg://buili_api:ci-api-password@127.0.0.1:5432/buili
          BUILI_TEST_POSTGRES_WORKER_URL: postgresql+asyncpg://buili_worker:ci-worker-password@127.0.0.1:5432/buili
        run: pytest tests/integration/test_postgres_rls.py -q
      - run: docker build -f apps/api/Dockerfile .

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
      - run: terraform -chdir=infra/terraform fmt -check -recursive
      - run: terraform -chdir=infra/terraform init -backend=false
      - run: terraform -chdir=infra/terraform validate

  secret-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject obvious committed provider secrets
        shell: bash
        run: |
          if git grep -nE '(sk-(proj|svcacct)-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----)' -- ':!*.md'; then
            echo 'Potential provider credential committed.' >&2
            exit 1
          fi
